<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Čtení Bible</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f9f9f9; color: #333; max-width: 700px; margin: 50px auto; padding: 20px; line-height: 1.6; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 5px; font-size: 1.4em; }
        #zobrazeni-versu { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .vers { margin-bottom: 8px; }
        .tlacitka { text-align: center; }
        button { color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; margin: 5px; }
        #dalsiTlacitko { background-color: #3498db; }
        #predchoziTlacitko { background-color: #f39c12; }
        #resetTlacitko { background-color: #e74c3c; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
    </style>
</head>
<body>

    <h1 id="nadpisKnihy">Načítání...</h1>
    <div id="zobrazeni-versu"></div>

    <div class="tlacitka">
        <button id="predchoziTlacitko" onclick="posun(-5)" disabled>Předchozích 5 veršů</button>
        <button id="dalsiTlacitko" onclick="posun(5)" disabled>Dalších 5 veršů</button>
    </div>

    <script>
        const APP_KEY = "db697h0o"; 
        const API_BASE = "https://keyvalue.immanuel.co/api/KeyVal";
        
        let vsechnyRadky = [];
        let indexVerše = 0; // Kolikátý verš v pořadí celkově čteme

        async function init() {
            const resp = await fetch('bible.txt');
            const text = await resp.text();
            vsechnyRadky = text.split(/\r?\n/);
            
            // Načtení pozice z cloudu
            const cloud = await fetch(`${API_BASE}/GetValue/${APP_KEY}/pozice`);
            const val = await cloud.text();
            indexVerše = parseInt(val.replace(/["\s]/g, ''), 10) || 0;
            
            vykresli();
        }

        function vykresli() {
            const kontejner = document.getElementById("zobrazeni-versu");
            kontejner.innerHTML = "";
            let nalezeneKnihy = new Set();
            let nacteneVerse = 0;
            let aktualniKniha = "Neznámá kniha";
            let vSmycceVerse = 0;

            for (let radek of vsechnyRadky) {
                let r = radek.trim();
                if (r === "") continue;

                if (/^[0-9]/.test(r)) {
                    // Je to verš
                    if (vSmycceVerse >= indexVerše && vSmycceVerse < indexVerše + 5) {
                        const p = document.createElement("p");
                        p.className = "vers";
                        p.innerText = r;
                        kontejner.appendChild(p);
                        nalezeneKnihy.add(aktualniKniha);
                    }
                    vSmycceVerse++;
                } else {
                    // Je to název knihy
                    aktualniKniha = r;
                }
            }

            document.getElementById("nadpisKnihy").innerText = Array.from(nalezeneKnihy).join(" - ");
            document.getElementById("predchoziTlacitko").disabled = (indexVerše <= 0);
            document.getElementById("dalsiTlacitko").disabled = (vSmycceVerse <= indexVerše + 5);
        }

        async function posun(smer) {
            indexVerše = Math.max(0, indexVerše + smer);
            vykresli();
            await fetch(`${API_BASE}/UpdateValue/${APP_KEY}/pozice/${indexVerše}`, {method: 'POST'});
        }

        window.onload = init;
    </script>
</body>
</html>
