<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Čtení Bible (ČEP)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9f9f9;
            color: #333;
            max-width: 700px;
            margin: 50px auto;
            padding: 20px;
            line-height: 1.6;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        .status-cteni {
            text-align: center;
            color: #7f8c8d;
            font-size: 0.9em;
            margin-bottom: 25px;
            min-height: 20px;
        }
        #zobrazeni-versu {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            min-height: 200px;
            margin-bottom: 20px;
            font-size: 1.1em;
        }
        .vers {
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        .vers:last-child {
            border-bottom: none;
        }
        .tlacitka {
            text-align: center;
        }
        button {
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin: 5px;
        }
        #dalsiTlacitko {
            background-color: #3498db;
        }
        #dalsiTlacitko:hover {
            background-color: #2980b9;
        }
        #predchoziTlacitko {
            background-color: #f39c12;
        }
        #predchoziTlacitko:hover {
            background-color: #e67e22;
        }
        #resetTlacitko {
            background-color: #e74c3c;
        }
        #resetTlacitko:hover {
            background-color: #c0392b;
        }
        button:disabled {
            background-color: #bdc3c7 !important;
            cursor: not-allowed;
        }
        .nacitani {
            color: #7f8c8d;
            font-style: italic;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>Český ekumenický překlad</h1>
    <div id="statusCteni" class="status-cteni">Připojování ke cloudu...</div>
    
    <div id="zobrazeni-versu">
        <p class="nacitani">Načítám texty ze souboru bible.txt...</p>
    </div>

    <div class="tlacitka">
        <button id="predchoziTlacitko" onclick="zobrazPredchozich5()" disabled>Předchozích 5</button>
        <button id="dalsiTlacitko" onclick="zobrazDalsich5()" disabled>Dalších 5 veršů</button>
        <button id="resetTlacitko" onclick="resetovatCteni()" disabled>Od začátku</button>
    </div>

    <script>
        // ==========================================
        // NASTAVENÍ CLOUDU (Zadejte svůj kód z keyvalue.immanuel.co)
        const APP_KEY = "db697h0o"; 
        // ==========================================

        const API_BASE = "https://keyvalue.immanuel.co/api/KeyVal";
        const DATA_KLIC = "pozice_cteni";
        
        let vsechnyVerse = [];
        let aktualniIndex = 0;
        const pocetNaKliknuti = 5;

        // Načtení textu a pozice z cloudu
        async function nactiTextBible() {
            try {
                const odpoved = await fetch('bible.txt');
                if (!odpoved.ok) throw new Error("Soubor bible.txt se nepodařilo najít.");
                
                const celyText = await odpoved.text();
                vsechnyVerse = celyText.split(/\r?\n/)
                    .map(radek => radek.trim())
                    .filter(radek => /^[0-9]/.test(radek));
                
                if (APP_KEY === "ZDE_VLOZTE_SVUJ_KOD" || APP_KEY === "") {
                    document.getElementById("statusCteni").innerHTML = "<span style='color:red'>Upozornění: Nevložili jste kód schránky. Čtení se nebude ukládat.</span>";
                } else {
                    try {
                        const cloudOdpoved = await fetch(`${API_BASE}/GetValue/${APP_KEY}/${DATA_KLIC}`);
                        if (cloudOdpoved.ok) {
                            const textOdpovedi = await cloudOdpoved.text();
                            const cistaHodnota = textOdpovedi.replace(/["\s]/g, ''); 
                            
                            if (cistaHodnota !== "null" && cistaHodnota !== "") {
                                const ulozenaHodnota = parseInt(cistaHodnota, 10);
                                if (!isNaN(ulozenaHodnota) && ulozenaHodnota < vsechnyVerse.length) {
                                    aktualniIndex = ulozenaHodnota;
                                }
                            }
                        }
                    } catch (e) {
                        console.warn("Nepodařilo se načíst pozici z cloudu, začíná se od nuly.");
                    }
                }

                document.getElementById("resetTlacitko").disabled = false;
                
                aktualizujStatus("Načteno z cloudu");
                zobrazDalsich5(false); 

            } catch (chyba) {
                document.getElementById("zobrazeni-versu").innerHTML = 
                    `<p style="color: red; text-align: center;">Chyba: ${chyba.message}</p>`;
                document.getElementById("statusCteni").innerText = "";
            }
        }

        // Zobrazení 5 veršů (směr dopředu)
        async function zobrazDalsich5(ulozitDoCloudu = true) {
            const kontejner = document.getElementById("zobrazeni-versu");
            const tlacitkoDalsi = document.getElementById("dalsiTlacitko");
            const tlacitkoPredchozi = document.getElementById("predchoziTlacitko");
            
            if (vsechnyVerse.length === 0) return;
            kontejner.innerHTML = ""; 

            const konecIndex = Math.min(aktualniIndex + pocetNaKliknuti, vsechnyVerse.length);

            for (let i = aktualniIndex; i < konecIndex; i++) {
                const odstavec = document.createElement("p");
                odstavec.className = "vers";
                odstavec.innerText = vsechnyVerse[i];
                kontejner.appendChild(odstavec);
            }

            // Posuneme index pro příští kliknutí dopředu
            aktualniIndex += pocetNaKliknuti;

            // Správa tlačítek podle toho, kde se v textu nacházíme
            if (aktualniIndex >= vsechnyVerse.length) {
                tlacitkoDalsi.innerText = "Konec textu";
                tlacitkoDalsi.disabled = true;
            } else {
                tlacitkoDalsi.innerText = "Dalších 5 veršů";
                tlacitkoDalsi.disabled = false;
            }

            if (aktualniIndex <= pocetNaKliknuti) {
                tlacitkoPredchozi.disabled = true;
            } else {
                tlacitkoPredchozi.disabled = false;
            }

            // Odeslání nové pozice do nástěnky
            if (ulozitDoCloudu && APP_KEY !== "ZDE_VLOZTE_SVUJ_KOD") {
                aktualizujStatus("Ukládám pozici...");
                try {
                    await fetch(`${API_BASE}/UpdateValue/${APP_KEY}/${DATA_KLIC}/${aktualniIndex}`, {
                        method: 'POST'
                    });
                    aktualizujStatus("Uloženo napříč zařízeními");
                } catch (e) {
                    aktualizujStatus("Chyba při ukládání (jste offline?)");
                }
            }
        }

        // Krok zpět
        async function zobrazPredchozich5() {
            // Protože zobrazení přidalo +5, musíme odečíst 10, abychom se dostali na začátek předchozího bloku
            aktualniIndex = Math.max(0, aktualniIndex - (pocetNaKliknuti * 2));
            
            // Nyní zavoláme standardní funkci, která verše vykreslí a sama si index zase o 5 posune
            await zobrazDalsich5(true);
        }

        function aktualizujStatus(zprava) {
            const statusZáložka = document.getElementById("statusCteni");
            // Odečítáme 5 (nebo méně), abychom uživateli ukázali číslo prvního právě zobrazeného verše
            let zobrazenyVersCislo = Math.max(1, aktualniIndex - pocetNaKliknuti + 1);
            
            if (aktualniIndex <= pocetNaKliknuti) {
                statusZáložka.innerText = `${zprava} (čtete od začátku)`;
            } else {
                statusZáložka.innerText = `${zprava} (od verše ${zobrazenyVersCislo})`;
            }
        }

        async function resetovatCteni() {
            if (confirm("Opravdu chcete začít od začátku? Vymaže se tím pozice na všech zařízeních.")) {
                aktualniIndex = 0;
                document.getElementById("dalsiTlacitko").disabled = false;
                document.getElementById("dalsiTlacitko").innerText = "Dalších 5 veršů";
                document.getElementById("predchoziTlacitko").disabled = true;
                
                if (APP_KEY !== "ZDE_VLOZTE_SVUJ_KOD") {
                    await fetch(`${API_BASE}/UpdateValue/${APP_KEY}/${DATA_KLIC}/0`, {
                        method: 'POST'
                    });
                }
                
                zobrazDalsich5(false);
                aktualizujStatus("Vynulováno");
            }
        }

        window.onload = nactiTextBible;
    </script>
</body>
</html>
